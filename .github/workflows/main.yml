name: Update GitHub Stats SVG

on:
  schedule:
    - cron: '0 */6 * * *'  # Her 6 saatte bir çalışır
  workflow_dispatch:        # Manuel tetikleme için
  push:
    branches:
      - main
    paths-ignore:
      - 'dark_mode.svg'
      - 'light_mode.svg'
      - 'cache/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Run today.py to update SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: efekrbs
        run: python today.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache/
          git diff --staged --quiet || git commit -m "Update GitHub stats SVGs"
          git push
